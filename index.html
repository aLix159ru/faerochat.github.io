<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faerochat — Aero Store & Quiz</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --bg-soft: rgba(238, 241, 255, 0.8);
      --text: #0f172a;
      --muted: #64748b;
      --card: rgba(255, 255, 255, 0.8);
      --accent: #6366f1;
      --accent-2: #a855f7;
      --glass-border: rgba(255, 255, 255, 0.5);
      --input-bg: rgba(255, 255, 255, 0.9);
    }

    body.dark {
      --bg: #050814;
      --bg-soft: rgba(12, 18, 48, 0.9);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --card: rgba(15, 23, 42, 0.85);
      --glass-border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(30, 41, 59, 0.9);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
    }

    header {
      background: var(--bg-soft);
      backdrop-filter: blur(15px);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 22px; }
    .logo img { width: 40px; height: 40px; border-radius: 10px; }

    .header-actions { display: flex; gap: 10px; }

    .btn { padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; transition: all 0.2s; font-family: inherit; }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 40px auto; padding: 0 24px; }
    .product { background: var(--card); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; display: flex; flex-direction: column; transition: 0.3s; }
    .product:hover { transform: translateY(-8px); }
    
    /* Кликабельная картинка */
    .product img { 
      width: 100%; 
      height: 200px; 
      object-fit: cover; 
      border-radius: 18px; 
      margin-bottom: 16px; 
      cursor: zoom-in;
      transition: opacity 0.2s;
    }
    .product img:hover { opacity: 0.9; }

    .price { font-weight: 800; font-size: 22px; margin: 12px 0; background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .cart { position: fixed; right: 24px; bottom: 24px; width: 320px; background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); z-index: 99; }
    .cart ul { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
    .cart li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--glass-border); }
    .remove { color: #ef4444; cursor: pointer; font-weight: bold; }

    .stats-widget { position: fixed; left: 24px; bottom: 24px; background: var(--card); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); padding: 12px 20px; border-radius: 20px; font-size: 14px; z-index: 90; display: flex; align-items: center; gap: 10px; }
    .stats-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; }

    /* МОДАЛКИ ОБЩИЕ */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: var(--card); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); padding: 32px; border-radius: 30px; width: 95%; max-width: 450px; text-align: center; color: var(--text); }

    /* МОДАЛКА ПРОСМОТРА КАРТИНКИ */
    #imagePreviewModal .modal-content {
      max-width: 80vw;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border: none;
    }
    #imagePreviewModal img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* АНИМАЦИЯ ЕБЗ */
    .ebz-loader { margin: 30px 0; height: 50px; display: flex; justify-content: center; align-items: center; }
    .ebz-line { width: 100%; height: 3px; background: var(--accent); transition: 0.3s; }
    .ebz-line.wave { animation: ebz-wave 0.6s infinite ease-in-out; height: 6px; border-radius: 3px; }
    
    @keyframes ebz-wave {
      0%, 100% { transform: scaleY(1); opacity: 0.5; }
      50% { transform: scaleY(4); background: var(--accent-2); opacity: 1; }
    }

    .checkmark { font-size: 50px; color: #22c55e; display: none; }
    .checkmark.show { display: block; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    /* КВИЗ */
    .quiz-card { position: relative; border-radius: 20px; overflow: hidden; margin: 20px 0; border: 2px solid var(--glass-border); }
    .quiz-card img { width: 100%; display: block; }
    .quiz-input-overlay { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); width: 85%; }
    .quiz-input-overlay input { width: 100%; padding: 12px; border: 3px solid #000; background: #fff; color: #000; font-weight: bold; text-align: center; border-radius: 5px; }

    footer { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="img/faerochat.jpg" alt="Logo">
    <span>Faerochat</span>
  </div>
  <div class="header-actions">
    <button class="btn" style="background: var(--card); border: 1px solid var(--glass-border); color: var(--text)" onclick="openQuiz()">🧩 Квиз</button>
    <button class="btn" style="background: var(--card); border: 1px solid var(--glass-border)" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</header>

<main class="products" id="productGrid"></main>

<div class="stats-widget">
  <div class="stats-dot"></div>
  <span style="color: var(--text)">Всего заказов: <strong id="orderCountDisplay">...</strong></span>
</div>

<div class="cart" id="cartOverlay">
  <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; color: var(--text)">
    <strong>🛒 Корзина</strong>
    <span id="cartCount" style="background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px;">0</span>
  </div>
  <ul id="cartItems" style="color: var(--text)"></ul>
  <div style="margin-top: 15px; display: flex; justify-content: space-between; color: var(--text)">
    <span>Итого:</span>
    <b><span id="total">0</span> $</b>
  </div>
  <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="openOrderModal()">Оформить заказ</button>
</div>

<div class="modal-overlay" id="imagePreviewModal" onclick="closeImagePreview()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="fullImage" src="" alt="Preview">
    <p style="color: white; margin-top: 10px; font-size: 14px;">Нажмите в любое место, чтобы закрыть</p>
  </div>
</div>

<div class="modal-overlay" id="orderModal">
  <div class="modal-content">
    <h2 style="text-align: left; margin: 0 0 20px 0;">📦 Оформление</h2>
    <div style="text-align: left; margin-bottom: 16px;">
      <label style="font-size: 14px; color: var(--muted);">Ваше имя</label>
      <input type="text" id="orderName" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text);" placeholder="Дмитрий Стеклопакет">
    </div>
    <div style="text-align: left; margin-bottom: 16px;">
      <label style="font-size: 14px; color: var(--muted);">Ваш e-mail</label>
      <input type="email" id="orderEmail" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text);" placeholder="faero@mail.com">
    </div>
    <div style="text-align: left; margin-bottom: 16px;">
      <label style="font-size: 14px; color: var(--muted);">Адрес доставки</label>
      <input type="text" id="orderAddress" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text);" placeholder="ул. Аэродинамическая, д. 7">
    </div>
    <button class="btn btn-primary" id="finalOrderBtn" style="width: 100%; margin-top: 10px;" onclick="startOrderProcess()">Купить</button>
    <button class="btn" style="width: 100%; margin-top: 10px; background: transparent; color: var(--muted)" onclick="closeOrderModal()">Отмена</button>
  </div>
</div>

<div class="modal-overlay" id="ebzModal">
  <div class="modal-content">
    <h3 id="ebzStatus">Инициализация...</h3>
    <div class="ebz-loader">
      <div id="ebzLine" class="ebz-line"></div>
      <div id="ebzCheck" class="checkmark">✔</div>
    </div>
    <button id="ebzCloseBtn" class="btn btn-primary" style="width: 100%; display: none;" onclick="finishEverything()">Закрыть</button>
  </div>
</div>

<div class="modal-overlay" id="quizModal">
  <div class="modal-content">
    <h2 style="margin: 0;">Кто это приготовил?</h2>
    <div class="quiz-card">
      <img src="img/photo_2026-04-16_19-49-27.jpg">
      <div class="quiz-input-overlay">
        <input type="text" id="quizAnswer" placeholder="Что в кастрюле?">
      </div>
    </div>
    <button class="btn btn-primary" style="width: 100%;" onclick="checkQuiz()">Проверить</button>
    <button class="btn" style="width: 100%; margin-top: 10px; background: transparent; color: var(--muted)" onclick="closeQuiz()">Отмена</button>
  </div>
</div>

<footer>© 2026 Faerochat Store — Aero Style</footer>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycby7dBLn9sO2C0Y1YPf_3Rqw2vB9jgIzf0meSMQrxLGQCg-jT0MTVqRv-1ouG-O1XsTi/exec";

  const products = [
    { id: 1, name: "Машина", price: 1500000, desc: "Самый лучший современный автомобиль!", img: "img/Machina_faerochat.jpg" },
    { id: 2, name: "Кроссовки", price: 6990, desc: "Удобные и стильные", img: "img/Crossovki_faerochat.jpg" },
    { id: 3, name: "Веник", price: 390, desc: "Надёжный инструмент для чата", img: "img/Venik_faerochat.jpg" },
    { id: 4, name: "Футболка", price: 1290, desc: "С ДМИТРИЕМ СТЕКЛОПАКЕТОМ!", img: "img/Fytbloka_faerochat.jpg" },
    { id: 5, name: "Nintendo Wii", price: 1000000000, desc: "Легендарная консоль", img: "img/Wii_faerochat.jpg" }
  ];

  let cart = JSON.parse(localStorage.getItem('faero_cart')) || [];

  // ФУНКЦИИ ПРОСМОТРА КАРТИНКИ
  function openImagePreview(src) {
    const modal = document.getElementById('imagePreviewModal');
    const fullImg = document.getElementById('fullImage');
    fullImg.src = src;
    modal.classList.add('active');
  }

  function closeImagePreview() {
    document.getElementById('imagePreviewModal').classList.remove('active');
  }

  async function updateOrderDisplay() {
    try {
      const response = await fetch(API_URL);
      const count = await response.text();
      document.getElementById('orderCountDisplay').textContent = count;
    } catch (e) { document.getElementById('orderCountDisplay').textContent = "0"; }
  }

  function renderProducts() {
    document.getElementById('productGrid').innerHTML = products.map(p => `
      <div class="product">
        <img src="${p.img}" onclick="openImagePreview('${p.img}')" title="Нажмите, чтобы увеличить">
        <h3>${p.name}</h3>
        <p style="color: var(--muted); flex-grow: 1; font-size: 0.9em;">${p.desc}</p>
        <div class="price">${p.price.toLocaleString()} $</div>
        <button class="btn btn-primary" onclick="addToCart(${p.id})">В корзину</button>
      </div>
    `).join('');
  }

  function renderCart() {
    const ul = document.getElementById('cartItems');
    ul.innerHTML = cart.length === 0 ? '<li style="color: var(--muted); border: none;">Пусто</li>' : '';
    let total = 0;
    cart.forEach((item, index) => {
      total += item.price * item.count;
      ul.innerHTML += `<li><div><b>${item.name}</b><br><small>${item.price.toLocaleString()} $ x ${item.count}</small></div><span class="remove" onclick="removeFromCart(${index})">✕</span></li>`;
    });
    document.getElementById('total').textContent = total.toLocaleString();
    document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.count, 0);
    localStorage.setItem('faero_cart', JSON.stringify(cart));
  }

  function addToCart(id) {
    const item = cart.find(i => i.id === id);
    if (item) item.count++; else cart.push({...products.find(p => p.id === id), count: 1});
    renderCart();
  }

  function removeFromCart(index) {
    if (cart[index].count > 1) cart[index].count--; else cart.splice(index, 1);
    renderCart();
  }

  function openOrderModal() { document.getElementById('orderModal').classList.add('active'); }
  function closeOrderModal() { document.getElementById('orderModal').classList.remove('active'); }

  async function startOrderProcess() {
    const name = document.getElementById('orderName').value;
    const email = document.getElementById('orderEmail').value;
    const address = document.getElementById('orderAddress').value;
    if (!name || !email || !address) return alert("Заполни все поля!");
    document.getElementById('finalOrderBtn').disabled = true;
    closeOrderModal();
    document.getElementById('ebzModal').classList.add('active');
    const status = document.getElementById('ebzStatus');
    const line = document.getElementById('ebzLine');
    setTimeout(() => { status.textContent = "Соединение с ЕБЗ..."; line.classList.add('wave'); }, 1000);
    setTimeout(async () => {
      status.textContent = "Отправка заказа...";
      try { await fetch(API_URL, { method: "POST", body: JSON.stringify({ name, email, address }) }); } catch (e) {}
    }, 3000);
    setTimeout(() => {
      status.textContent = "Заказ добавлен в ЕБЗ!";
      line.style.display = "none";
      document.getElementById('ebzCheck').classList.add('show');
      document.getElementById('ebzCloseBtn').style.display = "block";
      updateOrderDisplay();
    }, 5000);
  }

  function finishEverything() {
    cart = []; renderCart();
    document.getElementById('ebzModal').classList.remove('active');
    setTimeout(() => {
      document.getElementById('ebzStatus').textContent = "Инициализация...";
      document.getElementById('ebzLine').style.display = "block";
      document.getElementById('ebzLine').classList.remove('wave');
      document.getElementById('ebzCheck').classList.remove('show');
      document.getElementById('ebzCloseBtn').style.display = "none";
      document.getElementById('finalOrderBtn').disabled = false;
    }, 500);
  }

  function openQuiz() { document.getElementById('quizModal').classList.add('active'); }
  function closeQuiz() { document.getElementById('quizModal').classList.remove('active'); }
  function checkQuiz() {
    const val = document.getElementById('quizAnswer').value.trim().toLowerCase();
    if (val.includes('вода') || val.includes('суп')) { alert("ШЕФ-ПОВАР ОДОБРЯЕТ!"); closeQuiz(); } else alert("Не-а!");
  }

  function toggleTheme() {
    const dark = document.body.classList.toggle('dark');
    document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
  }

  renderProducts(); renderCart(); updateOrderDisplay();
</script>
</body>
</html>
