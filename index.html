<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faerochat — Aero Store & Quiz</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --bg-soft: rgba(238, 241, 255, 0.8);
      --text: #0f172a;
      --muted: #64748b;
      --card: rgba(255, 255, 255, 0.7);
      --accent: #6366f1;
      --accent-2: #a855f7;
      --glass-border: rgba(255, 255, 255, 0.5);
    }

    body.dark {
      --bg: #050814;
      --bg-soft: rgba(12, 18, 48, 0.8);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --card: rgba(15, 23, 42, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
    }

    header {
      background: var(--bg-soft);
      backdrop-filter: blur(12px);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 22px;
    }

    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn:active { transform: scale(0.95); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .product {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .product:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 16px;
    }

    .price {
      font-weight: 800;
      font-size: 22px;
      margin: 12px 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .cart {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 320px;
      background: var(--card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.2);
      z-index: 99;
    }

    .cart ul {
      list-style: none;
      padding: 0;
      max-height: 200px;
      overflow-y: auto;
      margin: 0 0 15px 0;
    }

    .cart li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .remove { color: #ef4444; cursor: pointer; font-weight: bold; }

    .stats-widget {
      position: fixed;
      left: 24px;
      bottom: 24px;
      background: var(--card);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      padding: 12px 20px;
      border-radius: 20px;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      z-index: 90;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stats-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 10px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Модальные окна */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      transition: 0.3s;
    }

    .modal-overlay.active { display: flex; opacity: 1; }

    .modal-content {
      background: var(--card);
      backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      padding: 32px;
      border-radius: 30px;
      width: 90%;
      max-width: 450px;
      transform: scale(0.9);
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
    }

    .modal-overlay.active .modal-content { transform: scale(1); }

    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--muted); }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    /* Квиз стили */
    .quiz-container {
      position: relative;
      margin: 20px 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .quiz-container img {
      width: 100%;
      display: block;
    }
    .quiz-input-box {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
    }
    .quiz-input-box input {
      width: 100%;
      padding: 10px;
      border: 3px solid #000;
      background: white;
      color: black;
      font-weight: bold;
      text-align: center;
      font-size: 1.2em;
    }

    footer {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="img/faerochat.jpg" alt="Logo">
    <span>Faerochat</span>
  </div>
  <div class="header-actions">
    <button class="btn" style="background: var(--card); border: 1px solid var(--glass-border)" onclick="openQuiz()">🧩 Квиз</button>
    <button class="btn" style="background: var(--card); border: 1px solid var(--glass-border)" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</header>

<main class="products" id="productGrid"></main>

<div class="stats-widget">
  <div class="stats-dot"></div>
  <span>Всего заказов: <strong id="orderCountDisplay">...</strong></span>
</div>

<div class="cart" id="cartOverlay">
  <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
    <strong>🛒 Корзина</strong>
    <span id="cartCount" style="background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px;">0</span>
  </div>
  <ul id="cartItems"></ul>
  <div style="margin-bottom: 15px; display: flex; justify-content: space-between;">
    <span>Итого:</span>
    <b><span id="total">0</span> ₽</b>
  </div>
  <button class="btn btn-primary" style="width: 100%" onclick="openOrderModal()">Оформить заказ</button>
</div>

<div class="modal-overlay" id="orderModal">
  <div class="modal-content">
    <h2 style="margin: 0 0 20px 0; text-align: left;">📦 Оформление</h2>
    <div class="form-group">
      <label>Ваше имя</label>
      <input type="text" id="orderName" placeholder="Дмитрий Стеклопакет">
    </div>
    <div class="form-group">
      <label>Ваш e-mail</label>
      <input type="email" id="orderEmail" placeholder="faero@mail.com">
    </div>
    <div class="form-group">
      <label>Адрес доставки</label>
      <input type="text" id="orderAddress" placeholder="ул. Аэродинамическая, д. 7">
    </div>
    <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="submitOrder()">Купить</button>
    <button class="btn" style="width: 100%; margin-top: 10px; background: transparent; color: var(--muted)" onclick="closeOrderModal()">Отмена</button>
  </div>
</div>

<div class="modal-overlay" id="quizModal">
  <div class="modal-content">
    <h2 style="margin-top: 0;">Что это за блюдо?</h2>
    <div class="quiz-container">
      <img src="img/photo_2026-04-16_19-49-27.jpg" alt="Meme Quiz">
      <div class="quiz-input-box">
        <input type="text" id="quizAnswer" placeholder="Введите название...">
      </div>
    </div>
    <button class="btn btn-primary" style="width: 100%;" onclick="checkQuiz()">Проверить</button>
    <button class="btn" style="width: 100%; margin-top: 10px; background: transparent; color: var(--muted)" onclick="closeQuiz()">Я не знаю...</button>
  </div>
</div>

<footer>© 2026 Faerochat Store — Aero Style</footer>

<script>
  // ЗАМЕНИТЕ ЭТУ ССЫЛКУ НА ВАШУ ИЗ GOOGLE APPS SCRIPT
  const API_URL = "https://script.google.com/macros/s/AKfycby7dBLn9sO2C0Y1YPf_3Rqw2vB9jgIzf0meSMQrxLGQCg-jT0MTVqRv-1ouG-O1XsTi/exec";

  const products = [
    { id: 1, name: "Машина", price: 1500000, desc: "Самый лучший современный автомобиль!", img: "img/Machina_faerochat.jpg", currency: "$" },
    { id: 2, name: "Кроссовки", price: 6990, desc: "Удобные и стильные", img: "img/Crossovki_faerochat.jpg", currency: "$" },
    { id: 3, name: "Веник", price: 390, desc: "Надёжный инструмент для чата", img: "img/Venik_faerochat.jpg", currency: "$" },
    { id: 4, name: "Футболка", price: 1290, desc: "С ДМИТРИЕМ СТЕКЛОПАКЕТОМ!", img: "img/Fytbloka_faerochat.jpg", currency: "$" },
    { id: 5, name: "Nintendo Wii", price: 1000000000000, desc: "Легендарная консоль", img: "img/Wii_faerochat.jpg", currency: "$" }
  ];

  let cart = JSON.parse(localStorage.getItem('faero_cart')) || [];

  async function updateOrderDisplay() {
    if (API_URL === "https://script.google.com/macros/s/AKfycby7dBLn9sO2C0Y1YPf_3Rqw2vB9jgIzf0meSMQrxLGQCg-jT0MTVqRv-1ouG-O1XsTi/exec") {
      document.getElementById('orderCountDisplay').textContent = "Demo";
      return;
    }
    try {
      const response = await fetch(API_URL);
      const count = await response.text();
      document.getElementById('orderCountDisplay').textContent = count;
    } catch (e) { document.getElementById('orderCountDisplay').textContent = "0"; }
  }

  function renderProducts() {
    document.getElementById('productGrid').innerHTML = products.map(p => `
      <div class="product">
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p style="color: var(--muted); flex-grow: 1; font-size: 0.9em;">${p.desc}</p>
        <div class="price">${p.price.toLocaleString()} ${p.currency}</div>
        <button class="btn btn-primary" onclick="addToCart(${p.id})">В корзину</button>
      </div>
    `).join('');
  }

  function renderCart() {
    const ul = document.getElementById('cartItems');
    ul.innerHTML = cart.length === 0 ? '<li style="color: var(--muted); border: none;">Пусто</li>' : '';
    let total = 0;
    cart.forEach((item, index) => {
      total += item.price * (item.count || 1);
      const li = document.createElement('li');
      li.innerHTML = `<div><b>${item.name}</b><br><small>${item.price.toLocaleString()} x ${item.count}</small></div>
                      <span class="remove" onclick="removeFromCart(${index})">✕</span>`;
      ul.appendChild(li);
    });
    document.getElementById('total').textContent = total.toLocaleString();
    document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.count, 0);
    localStorage.setItem('faero_cart', JSON.stringify(cart));
  }

  function addToCart(id) {
    const item = cart.find(i => i.id === id);
    if (item) item.count++; else cart.push({...products.find(p => p.id === id), count: 1});
    renderCart();
  }

  function removeFromCart(index) {
    if (cart[index].count > 1) cart[index].count--; else cart.splice(index, 1);
    renderCart();
  }

  function openOrderModal() {
    if (cart.length === 0) return alert("Корзина пуста!");
    document.getElementById('orderModal').classList.add('active');
  }

  function closeOrderModal() { document.getElementById('orderModal').classList.remove('active'); }

  // КВИЗ ЛОГИКА
  function openQuiz() { document.getElementById('quizModal').classList.add('active'); }
  function closeQuiz() { 
    document.getElementById('quizModal').classList.remove('active');
    document.getElementById('quizAnswer').value = ''; 
  }

  function checkQuiz() {
    const val = document.getElementById('quizAnswer').value.trim().toLowerCase();
    // Ответы, которые мы принимаем
    if (val.includes('вода') || val.includes('суп') || val.includes('дмитрий')) {
      alert("ШЕФ-ПОВАР ОДОБРЯЕТ! Это настоящий кулинарный шедевр.");
      closeQuiz();
    } else {
      alert("Повар недоволен... Попробуй еще раз!");
    }
  }

  async function submitOrder() {
    const data = {
      name: document.getElementById('orderName').value,
      email: document.getElementById('orderEmail').value,
      address: document.getElementById('orderAddress').value
    };
    if (!data.name || !data.email || !data.address) return alert("Заполни поля!");

    try {
      await fetch(API_URL, { method: "POST", body: JSON.stringify(data) });
      alert(`Ура, ${data.name}! Заказ отправлен.`);
      cart = []; renderCart(); closeOrderModal(); updateOrderDisplay();
    } catch (e) { alert("Ошибка API!"); }
  }

  function toggleTheme() {
    const dark = document.body.classList.toggle('dark');
    document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
  }

  window.onclick = function(event) {
    if (event.target.className === 'modal-overlay active') {
      closeOrderModal();
      closeQuiz();
    }
  }

  renderProducts(); renderCart(); updateOrderDisplay();
</script>
</body>
</html>
